<body>
    <!-- start page-wrapper -->
    <div class="page-wrapper">
        <!-- start preloader -->
        <div class="preloader">
            <div class="sk-folding-cube">
                <div class="sk-cube1 sk-cube"></div>
                <div class="sk-cube2 sk-cube"></div>
                <div class="sk-cube4 sk-cube"></div>
                <div class="sk-cube3 sk-cube"></div>
            </div>
        </div>
        <!-- end preloader -->
        <!-- Start header -->
        <header id="header" class="wpo-site-header wpo-header-style-3">
            <nav class="navigation navbar navbar-default">
                <div class="container">
                    <div class="navbar-header">
                        <a class="navbar-brand" href="index.html"><img src="assets/images/logo.png" style="height:60px" alt="logo"></a>
                    </div>
                    
                    <div class="cart-search-contact">
                        <div class="mini-cart">
                            <a class="theme-btn" href="#donate">Dona</a>
                        </div>
                    </div>
                </div><!-- end of container -->
            </nav>
        </header>
        <!-- end of header -->
        <!-- wpo-about-area start -->
        <div class="wpo-about-area memoria-hero">
            <img class="img-responsive memoria-hero__image" src="assets/images/sosterremoto.png" alt="SOS Terremoto">
        </div>
        <!-- wpo-about-area end -->
        <!-- wpo-cta-area start -->
        <div id="donate" class="wpo-cta-area">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="wpo-cta-text">
                            <!-- <h2>La compra de tickets ha culminado. El lunes 14 de febrero se anunciarán los ganadores.</h2> -->
                            <form onsubmit="window.location = 'https://donations.meals4hope.org/donations/details?locale=es&currency='  + currency.value + '&frecuency=single&m4h_source=cumplejuanma&amount=' + (document.getElementById('customAmount').value || amount.value); return false;">
                                <select id="currency" name="currency" class="form-control input-lg center-block" style="margin-bottom:20px;margin-top:20px;width:280px" required>
                                    <option value="EUR">Elija la moneda de pago</option>
                                    <option value="EUR">Euros</option>
                                    <option value="USD">Dólares</option>
                                </select>
                                <select id="amount" name="amount" class="form-control input-lg center-block" style="margin-bottom:20px;margin-top:20px;width:280px" required>
                                    <option value=5>Elige tu monto de donación</option>
                                    <option value=5>5€</option>
                                    <option value=10>10€</option>
                                    <option value=20>20€</option>
                                    <option value=30>30€</option>
                                    <option value=40>40€</option>
                                    <option value=50>50€</option>
                                </select>

                                <input id="customAmount" type="number" min="1" step="1" placeholder="O ingresa otro monto" class="form-control input-lg center-block" style="margin-bottom:20px;margin-top:20px;width:280px">

                                <!-- <input id="amount" placeholder="Indique cuántos cartones" type="number" name="amount" type="number" min="0" class="form-control input-lg center-block" style="margin-bottom:20px;margin-top:20px;width:280px" required></input> -->
                                <input class="theme-btn-s2" type="submit" value="Donar">
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- wpo-cta-area end -->
        <!-- start of hero -->
        <section>
            <div class="container">
                <div class="row">
                    <div class="col wpo-section-title text-center">
                        <h2 style="margin:30px">Visítanos en</h2>
                        <div class="btns">
                            <a href="https://www.meals4hope.org" class="theme-btn">Meals4Hope.org</a>
                        </div>
                        <!--
                        <hr>
                        <div class="btns">
                            <a href="https://donations.meals4hope.org/" class="theme-btn">Donar a Meals4Hope</a>
                        </div>
                        -->
                    </div>
                </div>
            </div>
        </section>
        <!-- end of hero slider -->
        <div class="wpo-ne-footer">
            <!-- start wpo-site-footer -->
            <footer class="wpo-site-footer">
                <div class="wpo-lower-footer">
                    <div class="container">
                        <div class="row">
                            <div class="col col-xs-12">

                        </div>
